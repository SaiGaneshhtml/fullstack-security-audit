<div class="login-wrapper">
  <!-- Glowing Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-container glass-card">
    <div class="header">
      <div class="logo-icon">🛡️</div>
      <h1>Create Security Account</h1>
      <p class="subtitle">Register to manage security audit records</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="alert alert-danger">
      <span class="alert-icon">⚠️</span>
      <span class="alert-text">{{ error }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label for="name">Operator Name</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          [(ngModel)]="name" 
          #nameInput="ngModel"
          required 
          placeholder="John Doe" 
          autocomplete="name"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="email">Security Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          #emailInput="ngModel"
          required 
          email
          placeholder="operator@company.com" 
          autocomplete="email"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="password">Choose Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          #passwordInput="ngModel"
          required 
          placeholder="At least 8 characters, letters & numbers" 
          autocomplete="new-password"
          [disabled]="loading"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="registerForm.invalid || loading">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <div class="footer">
      <p>Already have an account? <a routerLink="/login">Unlock Control Panel</a></p>
    </div>
  </div>
</div>
