<div class="login-wrapper">
  <!-- Glowing Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-container glass-card">
    <div class="header">
      <div class="logo-icon">🛡️</div>
      <h1>Security Audit Portal</h1>
      <p class="subtitle">Enter your details to access the control panel</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="alert alert-danger">
      <span class="alert-icon">⚠️</span>
      <span class="alert-text">{{ error }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Security Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          #emailInput="ngModel"
          required 
          email
          placeholder="admin@example.com" 
          autocomplete="email"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="password">Authorization Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          #passwordInput="ngModel"
          required 
          placeholder="••••••••" 
          autocomplete="current-password"
          [disabled]="loading"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Unlock Control Panel</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <div class="footer">
      <p>Need access? <a routerLink="/register">Register new administrator</a></p>
      <p class="seeding-tip">💡 Dev Tip: Login with <strong>admin&#64;example.com</strong> / <strong>Password1</strong></p>
    </div>
  </div>
</div>
